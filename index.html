<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>O que sobra pro beta?</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #000;
      color: #fff;
      font-family: Arial Black, Arial, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    /* Partículas de fundo */
    .particles {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
    }

    .particle {
      position: absolute;
      width: 3px;
      height: 3px;
      background: #e74c3c;
      border-radius: 50%;
      animation: float linear infinite;
      opacity: 0;
    }

    @keyframes float {
      0%   { transform: translateY(100vh) scale(0); opacity: 0; }
      10%  { opacity: 0.6; }
      90%  { opacity: 0.3; }
      100% { transform: translateY(-10vh) scale(1.5); opacity: 0; }
    }

    .container {
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 40px;
      padding: 20px;
      position: relative;
      z-index: 1;
    }

    h1 {
      font-size: clamp(2rem, 8vw, 4rem);
      font-weight: 900;
      animation: glitch 4s infinite;
      position: relative;
    }

    h1::before, h1::after {
      content: attr(data-text);
      position: absolute;
      left: 0; top: 0;
      width: 100%;
    }

    h1::before {
      color: #e74c3c;
      animation: glitch-r 4s infinite;
      clip-path: polygon(0 0, 100% 0, 100% 35%, 0 35%);
    }

    h1::after {
      color: #2ecc40;
      animation: glitch-g 4s infinite;
      clip-path: polygon(0 65%, 100% 65%, 100% 100%, 0 100%);
    }

    @keyframes glitch {
      0%, 90%, 100% { transform: translate(0); }
      92% { transform: translate(-2px, 1px); }
      94% { transform: translate(2px, -1px); }
      96% { transform: translate(-1px, 2px); }
      98% { transform: translate(1px, -2px); }
    }

    @keyframes glitch-r {
      0%, 90%, 100% { transform: translate(0); opacity: 0; }
      92% { transform: translate(3px, 0); opacity: 0.8; }
      94% { transform: translate(-3px, 0); opacity: 0.8; }
      96% { transform: translate(2px, 0); opacity: 0.8; }
      98% { transform: translate(0); opacity: 0; }
    }

    @keyframes glitch-g {
      0%, 90%, 100% { transform: translate(0); opacity: 0; }
      92% { transform: translate(-3px, 0); opacity: 0.8; }
      94% { transform: translate(3px, 0); opacity: 0.8; }
      96% { transform: translate(-2px, 0); opacity: 0.8; }
      98% { transform: translate(0); opacity: 0; }
    }

    .buttons {
      display: flex;
      gap: 24px;
      flex-wrap: wrap;
      justify-content: center;
    }

    button {
      padding: 18px 48px;
      font-size: 1.3rem;
      font-weight: 700;
      border: none;
      border-radius: 14px;
      cursor: pointer;
      font-family: inherit;
      position: relative;
      overflow: hidden;
      transition: transform 0.15s ease;
    }

    button::after {
      content: "";
      position: absolute;
      inset: 0;
      background: rgba(255,255,255,0.25);
      transform: translateX(-100%);
      transition: transform 0.3s ease;
    }

    button:hover::after { transform: translateX(0); }
    button:hover { transform: scale(1.08); }
    button:active { transform: scale(0.96); }

    #btn-tudo {
      background: #2ecc40;
      color: #fff;
      box-shadow: 0 0 20px rgba(46,204,64,0.4);
      animation: pulse-green 2.5s ease-in-out infinite;
    }

    #btn-nada {
      background: #e74c3c;
      color: #fff;
      box-shadow: 0 0 20px rgba(231,76,60,0.4);
      animation: pulse-red 2.5s ease-in-out infinite;
    }

    @keyframes pulse-green {
      0%, 100% { box-shadow: 0 0 20px rgba(46,204,64,0.4); }
      50%       { box-shadow: 0 0 40px rgba(46,204,64,0.8), 0 0 60px rgba(46,204,64,0.3); }
    }

    @keyframes pulse-red {
      0%, 100% { box-shadow: 0 0 20px rgba(231,76,60,0.4); }
      50%       { box-shadow: 0 0 40px rgba(231,76,60,0.8), 0 0 60px rgba(231,76,60,0.3); }
    }

    /* Overlay */
    #overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.0);
      z-index: 10;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 24px;
    }

    #overlay.show {
      display: flex;
      animation: overlayIn 0.5s ease forwards;
    }

    #overlay.hide {
      animation: overlayOut 0.4s ease forwards;
    }

    @keyframes overlayIn {
      from { background: rgba(0,0,0,0); }
      to   { background: rgba(0,0,0,0.93); }
    }

    @keyframes overlayOut {
      from { background: rgba(0,0,0,0.93); opacity: 1; }
      to   { background: rgba(0,0,0,0); opacity: 0; }
    }

    #foto-wrapper {
      animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) 0.1s both;
    }

    @keyframes popIn {
      from { transform: scale(0.4) rotate(-8deg); opacity: 0; }
      to   { transform: scale(1) rotate(0deg); opacity: 1; }
    }

    #overlay img {
      max-width: min(85vw, 400px);
      max-height: 68vh;
      border-radius: 20px;
      object-fit: cover;
      box-shadow: 0 0 50px rgba(231,76,60,0.6), 0 0 100px rgba(231,76,60,0.3);
      animation: imgPulse 2s ease-in-out infinite 0.6s;
    }

    @keyframes imgPulse {
      0%, 100% { box-shadow: 0 0 50px rgba(231,76,60,0.6), 0 0 100px rgba(231,76,60,0.3); }
      50%       { box-shadow: 0 0 70px rgba(231,76,60,0.9), 0 0 140px rgba(231,76,60,0.5); }
    }

    #overlay-label {
      font-size: 2rem;
      font-weight: 900;
      color: #e74c3c;
      letter-spacing: 3px;
      text-shadow: 0 0 20px rgba(231,76,60,0.9);
      animation: popIn 0.4s ease 0.05s both, blink 1.5s ease-in-out infinite 1s;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.5; }
    }

    #btn-fechar {
      background: transparent;
      border: 2px solid rgba(255,255,255,0.6);
      color: #fff;
      padding: 10px 32px;
      border-radius: 10px;
      font-size: 1rem;
      animation: popIn 0.4s ease 0.3s both;
      box-shadow: none;
    }

    #btn-fechar:hover { background: #fff; color: #000; transform: scale(1.05); }

    /* Shake no botão Tudo quando clicado */
    @keyframes shake {
      0%,100% { transform: translateX(0); }
      20% { transform: translateX(-8px) rotate(-2deg); }
      40% { transform: translateX(8px) rotate(2deg); }
      60% { transform: translateX(-6px); }
      80% { transform: translateX(6px); }
    }

    #btn-tudo.shaking { animation: shake 0.5s ease, pulse-green 2.5s ease-in-out infinite; }
  </style>
</head>

      <button id="btn-nada">Nada</button>
    </div>
  </div>

      p.style.left = Math.random() * 100 + "vw";
      p.style.width = p.style.height = (Math.random() * 4 + 2) + "px";
      p.style.animationDuration = (Math.random() * 8 + 6) + "s";
      p.style.animationDelay = (Math.random() * 8) + "s";
      // Alterna cor entre vermelho e verde
      p.style.background = Math.random() > 0.5 ? "#e74c3c" : "#2ecc40";
      container.appendChild(p);
    }

    // Overlay
    const overlay = document.getElementById("overlay");

    document.getElementById("btn-nada").addEventListener("click", () => {
      overlay.classList.remove("hide");
      overlay.classList.add("show");
    });

    function fechar() {
      overlay.classList.add("hide");
      setTimeout(() => {
        overlay.classList.remove("show", "hide");
      }, 400);
    }

    document.getElementById("btn-fechar").addEventListener("click", fechar);
    overlay.addEventListener("click", (e) => { if (e.target === overlay) fechar(); });

    // Botão Tudo: shake + muda texto
    const btnTudo = document.getElementById("btn-tudo");
    const h1 = document.querySelector("h1");
    btnTudo.addEventListener("click", () => {
      h1.textContent = "Mentira, nada mesmo 💀";
      h1.setAttribute("data-text", "Mentira, nada mesmo 💀");
      btnTudo.classList.remove("shaking");
      void btnTudo.offsetWidth;
      btnTudo.classList.add("shaking");
    });
    btnTudo.addEventListener("animationend", (e) => {
      if (e.animationName === "shake") btnTudo.classList.remove("shaking");
    });
  </script>

</body>
</html>
