<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Para Sophia 🖤</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Segoe UI',sans-serif;
    height:100vh;
    overflow:hidden;
    display:flex;
    justify-content:center;
    align-items:center;

    background:linear-gradient(
        -45deg,
        #000000,
        #111111,
        #1a001a,
        #2b002b
    );

    background-size:400% 400%;
    animation:fundo 12s ease infinite;
}

@keyframes fundo{
    0%{background-position:0% 50%;}
    50%{background-position:100% 50%;}
    100%{background-position:0% 50%;}
}

.card{
    background:rgba(15,15,15,0.92);
    border:1px solid #5e35b1;

    padding:45px;
    border-radius:25px;

    max-width:700px;
    text-align:center;

    box-shadow:
    0 0 30px rgba(179,136,255,.25),
    0 0 60px rgba(179,136,255,.15);
}

h1{
    color:#b388ff;
    margin-bottom:20px;
    font-size:40px;
}

p{
    color:#d0d0d0;
    font-size:18px;
    line-height:1.7;
    margin-bottom:25px;
}

h2{
    color:white;
    font-size:28px;
}

.buttons{
    margin-top:35px;
    display:flex;
    justify-content:center;
    gap:20px;
}

button{
    border:none;
    padding:16px 35px;
    border-radius:50px;
    cursor:pointer;
    font-size:18px;
    transition:.3s;
}

button:hover{
    transform:scale(1.08);
}

#bonita{
    background:#2b2b2b;
    color:white;
}

#linda{
    background:#5e35b1;
    color:white;
}

#resultado{
    margin-top:30px;
    font-size:24px;
    color:#b388ff;
    font-weight:bold;
}

.simbolo{
    position:absolute;
    animation:subir 7s linear forwards;
    pointer-events:none;
}

@keyframes subir{

    0%{
        transform:translateY(110vh) rotate(0deg);
        opacity:1;
    }

    100%{
        transform:translateY(-120vh) rotate(360deg);
        opacity:0;
    }
}

.frase{
    margin-top:15px;
    color:#9e9e9e;
    font-style:italic;
}

</style>
</head>

<body>

<div class="card">

<h1>🌙 Para Sophia 🖤</h1>

<p>
Sophia, depois de uma análise extremamente cuidadosa,
algumas noites sem dormir e uma quantidade questionável
de pensamentos aleatórios...
</p>

<h2>
Você está linda ou absolutamente deslumbrante hoje? 🥀
</h2>

<p class="frase">
(Escolha com sabedoria...)
</p>

<div class="buttons">

<button id="bonita" onclick="bonita()">
🥀 Linda
</button>

<button id="linda" onclick="linda()">
🖤 Deslumbrante
</button>

</div>

<div id="resultado"></div>

</div>

<script>

function bonita(){

    document.getElementById("resultado").innerHTML =
    "Sophia... linda? Talvez. Mas meus olhos ainda insistem que você está deslumbrante. 🖤";
}

function linda(){

    document.getElementById("resultado").innerHTML =
    "Eu sabia. 🌙🥀 Você está absolutamente deslumbrante hoje, Sophia.";

    explosao();
}

function criarSimbolo(){

    const simbolos =
    ["🖤","🥀","🌙","🦇","⛓️"];

    const item =
    document.createElement("div");

    item.classList.add("simbolo");

    item.innerHTML =
    simbolos[Math.floor(Math.random()*simbolos.length)];

    item.style.left =
    Math.random()*100 + "vw";

    item.style.fontSize =
    (20 + Math.random()*35) + "px";

    document.body.appendChild(item);

    setTimeout(()=>{
        item.remove();
    },7000);
}

function explosao(){

    for(let i=0;i<60;i++){

        setTimeout(()=>{
            criarSimbolo();
        },i*40);

    }
}

setInterval(criarSimbolo,500);

</script>

</body>
</html>
