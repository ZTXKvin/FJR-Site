<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pedido de Casamento</title>
  <style>
    body {
      margin: 0;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #f7c2d7 0%, #f2e1ff 100%);
      color: #3d2b56;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
    }
    .card {
      background: rgba(255, 255, 255, 0.95);
      border-radius: 24px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.12);
      max-width: 640px;
      width: 100%;
      padding: 3rem;
    }
    h1 {
      font-size: 2.8rem;
      margin: 0 0 1rem;
    }
    p {
      font-size: 1.1rem;
      line-height: 1.8;
      margin: 0 0 1.8rem;
    }
    .heart {
      font-size: 4rem;
      color: #e74c89;
      margin: 0.5rem 0 1.5rem;
    }
    .button {
      display: inline-block;
      background: #8d5bff;
      color: #fff;
      text-decoration: none;
      padding: 1rem 2rem;
      border-radius: 999px;
      font-weight: 700;
      transition: transform 0.2s ease, background 0.2s ease;
    }
    .button:hover {
      transform: translateY(-3px);
      background: #6f3fe1;
    }
    footer {
      margin-top: 2rem;
      color: #5c4b7d;
      font-size: 0.95rem;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="heart">♥</div>
    <h1>Quer casar comigo?</h1>
    <p>Desde o primeiro olhar, você mudou minha vida. Cada sorriso seu é um motivo a mais para sonhar.
      Hoje eu te peço de coração aberto: vamos caminhar juntos para sempre?</p>
    <a class="button" href="#resposta">Sim, para sempre!</a>
    <footer id="resposta">Eu te amo e quero construir nossa história lado a lado.</footer>
  </div>
</body>
</html>
